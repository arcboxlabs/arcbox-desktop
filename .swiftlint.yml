included:
  - ArcBox
  - ArcBoxTests
  - Packages

excluded:
  - Packages/ArcBoxClient/Sources/ArcBoxClient/Generated
  - Packages/*/.build
  - .build
  - .claude

disabled_rules:
  # SwiftFormat places braces and closure parameters using a different multiline style.
  - opening_brace
  - closure_parameter_position
  # Conflicts with Swift package manifests and SwiftFormat's trailing comma behavior.
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - first_where
  - flatmap_over_map_reduce
  - last_where
  - modifier_order
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 160
  error: 220
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 100
  error: 150

type_body_length:
  warning: 650
  error: 800

file_length:
  warning: 900
  error: 1200

cyclomatic_complexity:
  warning: 18
  error: 25

identifier_name:
  min_length:
    warning: 1
    error: 1

todo:
  only: [FIXME]
